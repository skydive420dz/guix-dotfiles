# synthetic accepted GRUB fixture
set gfxmode=3440x1440,2560x1440,1920x1080,auto
insmod keylayouts
keymap /gnu/store/keymap
set default=0
set timeout=5
menuentry "GNU current" {
  linux /gnu/store/linux/bzImage root=fixture gnu.system=/gnu/store/aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa-current-system gnu.load=/gnu/store/aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa-current-system/boot
  initrd /gnu/store/initrd/initrd.img
}

submenu "GNU system, old configurations..." {
menuentry "GNU old (#9, 2026-01-09 09:00)" {
  linux /gnu/store/linux/bzImage root=fixture gnu.system=/var/guix/profiles/system-9-link gnu.load=/var/guix/profiles/system-9-link/boot
  initrd /gnu/store/initrd/initrd.img
}
menuentry "GNU old (#5, 2026-01-05 05:00)" {
  linux /gnu/store/linux/bzImage root=fixture gnu.system=/var/guix/profiles/system-5-link gnu.load=/var/guix/profiles/system-5-link/boot
  initrd /gnu/store/initrd/initrd.img
}
}

if [ "${grub_platform}" == efi ]; then
  menuentry "Firmware setup" {
    fwsetup
  }
fi
